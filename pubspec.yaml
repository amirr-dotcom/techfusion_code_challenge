name: techfusion_code_challenge
description: "A professional User Directory App built with Clean Architecture and BLoC."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.7 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # C
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8

  # E
  easy_localization: ^3.0.8
  equatable: ^2.0.7

  # F
  flutter_bloc: ^8.1.6
  flutter_dotenv: ^5.1.0
  flutter_spinkit: ^5.2.1

  # G
  get_it: ^8.0.2
  go_router: ^13.2.0
  google_fonts: ^6.2.1

  # H
  http: ^1.2.1

  # I
  injectable: ^2.5.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  injectable_generator: ^2.6.2
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - .env
